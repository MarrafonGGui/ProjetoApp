<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartVendas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
{% with messages = get_flashed_messages() %}
  {% if messages %}
    <script>
      alert("{{ messages[0] }}");
    </script>
  {% endif %}
{% endwith %}
<body class="bg-dark text-white text-center">

    <div class="container mt-5">
        <div class="home-buttons">
            <button class="btn btn-outline-danger btn-lg" onclick="window.location.href='/'">
                Home
            </button>
            <button class="btn btn-outline-danger btn-lg distant" onclick="window.location.href='/produtos'">
                Voltar
            </button>
        </div><hr>

        <h2>Lista de Produtos</h2>

        <table class="table table-dark table-striped">
            <thead class="table-warning">
                <tr>
                    <th>ID</th>
                    <th>Nome</th>
                    <th>Preço</th>
                    <th>Quantidade</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody id="tabela-produtos"></tbody>
        </table>
 
        <hr>
        
        <div style="display: flex; justify-content: right;">
        <button class="btn btn-outline-warning btn-lg" onclick="window.location.href='/produtos/cadastro'">
            Cadastrar
        </button>
    </div>
    <script src="{{ url_for('static', filename='script-produtos.js') }}"></script>
    <script>
        carregarProdutos();
    </script>

</body>
</html>
