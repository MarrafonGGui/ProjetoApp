<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro produto</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
{% with messages = get_flashed_messages() %}
  {% if messages %}
    <script>
      alert("{{ messages[0] }}");
    </script>
  {% endif %}
{% endwith %}
<body class="bg-dark text-white text-center">

    <div class="container mt-5">
        
        <h1>Adicionar Produto</h1>

        <input class="ipt-cadastro" type="text" id="nome" placeholder="Nome do produto" required><br><br>
        <input class="ipt-cadastro" type="number" step="0.01" id="preco" placeholder="Preço" required><br><br>
        <input class="ipt-cadastro" type="number" id="quantidade" placeholder="Quantidade" required><br><br>
        <button class="btn btn-outline-success btn-lg" onclick="cadastrar()">Salvar</button>
 
        <br><hr>
        <button class="btn btn-outline-danger btn-lg" onclick="window.location.href='/'">
            Home
        </button>
        <button class="btn btn-outline-danger btn-lg" onclick="window.location.href='/produtos'">
            Voltar
        </button>
        <button class="btn btn-outline-danger btn-lg" onclick="window.location.href='/produtos/lista'">
            Lista
        </button>

    </div>
    <script src="{{ url_for('static', filename='script-produtos.js') }}"></script>
</body>
</html>
