<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartVendas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
{% with messages = get_flashed_messages() %}
  {% if messages %}
    <script>
      alert("{{ messages[0] }}");
    </script>
  {% endif %}
{% endwith %}
<body class="bg-dark text-white text-center">

    <div class="container mt-5">
        <div style="display: flex; justify-content: space-between;">
            <div>
                <button class="btn btn-outline-danger btn-lg" onclick="window.location.href='/'">
                    Home
                </button>
                <button class="btn btn-outline-danger btn-lg distant" onclick="window.location.href='/produtos'">
                    Voltar
                </button>
            </div>
            <button class="btn btn-outline-warning btn-lg" onclick="window.location.href='/produtos/lista'">
                Lista
            </button>
        </div><hr><br>
        
        <h1>Adicionar Produto</h1><br>

        <input class="ipt-cadastro" type="text" id="nome" placeholder="Nome do produto" required><br><br>
        <input class="ipt-cadastro" type="number" step="0.01" id="preco" placeholder="Preço" required><br><br>
        <input class="ipt-cadastro" type="number" id="quantidade" placeholder="Quantidade" required><br><br>
        <button class="btn btn-outline-success btn-lg" onclick="cadastrar()">Salvar</button>
 
        <br><hr>


    </div>
    <script src="{{ url_for('static', filename='script-produtos.js') }}"></script>
</body>
</html>
