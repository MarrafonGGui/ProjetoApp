<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartVendas</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="bg-dark text-white text-center">

    <div class="container mt-5">
        <button class="btn btn-outline-danger btn-lg" onclick="window.location.href='/produtos/lista'">
            Voltar
        </button>
        <hr>

        <h1>Editar Produto</h1><br>

        <input class="ipt-cadastro" type="text" id="nome" placeholder="Nome" required><br><br>
        <input class="ipt-cadastro" type="number" step="0.01" id="preco" placeholder="Preço" required><br><br>
        <input class="ipt-cadastro" type="number" id="quantidade" placeholder="Quantidade" required><br><br>
        <button class="btn btn-outline-success btn-lg" onclick="editar()">Alterar</button>
 
        <hr><br>
        <button class="btn btn-outline-danger" onclick="deletar()">
            Excluir Produto
        </button>

    </div>
    <script src="{{ url_for('static', filename='script-produtos.js') }}"></script>
    <script>
        const id = window.location.pathname.split("/").pop();
        carregarProduto();
    </script>
</body>
</html>
