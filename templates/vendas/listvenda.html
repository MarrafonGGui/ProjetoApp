<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vendas Flask</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
{% with messages = get_flashed_messages() %}
  {% if messages %}
    <script>
      alert("{{ messages[0] }}");
    </script>
  {% endif %}
{% endwith %}
<body class="bg-dark text-white text-center">

    <div class="container mt-5">
        <h1>Lista de Vendas</h1>

        <table class="table table-dark table-striped">
            <thead class="table-warning">
                <tr>
                    <th>Id</th>
                    <th>Data</th>
                    <th>Cliente</th>
                    <th>Total</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody id="tabela-vendas"></tbody>
        </table>

        <button class="btn btn-outline-danger btn-lg"onclick="window.location.href='/'">
            Home
        </button>
        <button class="btn btn-outline-danger btn-lg"onclick="window.location.href='/vendas'">
            Voltar
        </button>
        <button class="btn btn-outline-danger btn-lg"onclick="window.location.href='/vendas/efetuar'">
            Efetuar Venda
        </button>
    </div>
<script src="{{ url_for('static', filename='script-vendas.js') }}"></script>
<script>
        carregarVendas();
</script>
</body>
</html>
