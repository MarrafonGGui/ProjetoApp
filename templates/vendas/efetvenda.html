<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vendas Flask</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="bg-dark text-white text-center">
    {% with messages = get_flashed_messages() %}
        {% if messages %}
            <script>
                alert("{{ messages[0] }}");
            </script>
        {% endif %}
    {% endwith %}
    
    <div class="container mt-5">
        <div class="home-buttons">
            <button class="btn btn-outline-danger btn-lg"onclick="window.location.href='/'">
                Home
            </button>
            <button class="btn btn-outline-danger btn-lg"onclick="window.location.href='/vendas/lista'">
                Listar Vendas
            </button>
        </div>
        <h1>Nova Venda</h1>

        <form method="POST" class="sell-quest">
            
            <label class="sell-quest">Cliente:</label><br>
            <select name="id_cliente" class="ipt-cadastro" required>
                {% for c in clientes %}
                    <option class="form-control ipt-cadastro" value="{{ c.id_cliente }}">{{ c.nome }}</option>
                {% endfor %}
            </select>
            <br><br>
            <div id="produtos-container">
                <div class="produto-item">
                    <label>Produto:</label>
                    <select name="id_produto[]" class="ipt-cadastro">
                        {% for p in produtos %}
                            <option value="{{ p.id_produto }}">
                                {{ p.nome_produto }} - R$ {{ p.preco }}
                            </option>
                        {% endfor %}
                    </select>
                    <label>Quantidade:</label>
                    <input type="number" class="ipt-cadastro" name="quantidade[]" placeholder="Quantidade" min="1"  value="1" required>

                    <button type="button" class="btn btn-outline-danger btn-sm" onclick="removerProduto(this)">
                        Remover Produto
                    </button>
                </div>
                
            </div> 
            <br>
                <button type="button" onclick="adicionarProduto()" class="btn btn-outline-success btn-lg">
                    Adicionar Produto++
                </button>
            
            <br><br>
            <button type="submit" class="btn btn-outline-primary btn-lg">
                Finalizar Venda
            </button>
        </form>
    </div>
</body>
<script>
    const produtos = {{ produtos_json | tojson }};
</script>
<script src="{{ url_for('static', filename='script.js') }}"></script>
</html>
