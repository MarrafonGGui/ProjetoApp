<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartVendas</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="bg-dark text-white text-center">

    <div class="container mt-5">
        <div style="display: flex; justify-content: space-between;">
            <div>
                <button class="btn btn-outline-danger btn-lg" onclick="window.location.href='/'">
                    Home
                </button>
                <button class="btn btn-outline-danger btn-lg distant"onclick="window.location.href='/vendas'">
                    Voltar
                </button>
            </div>
            <button class="btn btn-outline-warning btn-lg" onclick="window.location.href='/vendas/lista'">
                Listar Vendas
            </button>
        </div>
        <h1>Nova Venda</h1><hr>
 
        <label class="sell-quest">Cliente:</label><br>
        <select id="id_cliente" class="ipt-cadastro" required>
            <option value="">Carregando...</option>
        </select>
        <br><br><hr>
 
        <div id="produtos-container"></div>
        <hr><br>
        <div style="display: flex; align-items: center; position: relative;">
            <button type="button" onclick="adicionarProduto()" class="btn btn-outline-success btn-lg" style="margin: 0 auto;">
                Adicionar Produto++
            </button>
            <button type="button" onclick="finalizarVenda()" class="btn btn-outline-primary btn-lg" style="position: absolute; right: 0 ;">
                Finalizar Venda
            </button>
        </div>
    </div>
</body>
<script src="{{ url_for('static', filename='script-vendas.js') }}"></script>

    carregarDados();
</script>
</html>
