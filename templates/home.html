<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartVendas</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
{% with messages = get_flashed_messages() %}
  {% if messages %}
    <script>
      alert("{{ messages[0] }}");
    </script>
  {% endif %}
{% endwith %}
<body class="bg-dark text-white text-center">

    <div class="container mt-5">
        <div style="display:flex; justify-content: space-between;">
            <div>
                <button class="btn btn-outline-warning" onclick="window.location.href='/login'">
                    Login
                </button>
                <button onclick="logout()" class="btn btn-outline-danger">
                    Logout
                </button>
            </div>
            <button class="btn btn-outline-info" onclick="window.location.href='/admin/gestao'">
                Gestão
            </button>
        </div>
        <hr>
        <h1>SMARTVendas</h1><br>
        <button class="btn btn-outline-warning btn-lg distant" onclick="window.location.href='/cliente'">
            Cliente
        </button>        
        <button class="btn btn-outline-warning btn-lg distant" onclick="window.location.href='/vendas'">
            Vendas
        </button>
        <button class="btn btn-outline-warning btn-lg distant" onclick="window.location.href='/produtos'">
            Produtos
        </button>
    </div>

</body>
<script>
    async function logout() {
        await fetch("/api/logout", { method: "POST" });
        window.location.href = "/login";
    }
    async function irCadastro() {
        const res = await fetch("/api/me");
        const user = await res.json();

        if (user.is_admin) {
            window.location.href = "/register";
        } else {
            alert("Apenas admin pode acessar");
        }
    }
</script>
</html>
