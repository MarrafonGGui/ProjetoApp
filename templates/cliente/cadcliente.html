<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartVendas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body class="bg-dark text-white text-center">
    
    <div class="container mt-5">
        <div style="display: flex; justify-content: space-between;">
            <div>
                <button class="btn btn-outline-danger btn-lg" onclick="window.location.href='/'">
                    Home
                </button>
                <button class="btn btn-outline-danger btn-lg distant" onclick="window.location.href='/cliente'">
                    Voltar
                </button>
            </div>
            <button class="btn btn-outline-warning btn-lg" style="margin-top: 10px" onclick="window.location.href='/cliente/lista'">
                Listar
            </button>
        </div>
        <hr>
        <h1>Cadastro de Clientes</h1><br>

        <input class="ipt-cadastro" type="text" id="cpf" placeholder="CPF" required><br><br>
        <input class="ipt-cadastro" type="text" id="nome" placeholder="Nome" required><br><br>
        <input class="ipt-cadastro" type="email" id="email" placeholder="Email" required><br><br>
        <button class="btn btn-outline-success btn-lg" onclick="cadastrar()">Salvar</button><br><hr>

    </div>
    <script src="{{ url_for('static', filename='script-clientes.js') }}"></script>
</body>
</html>
