<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartVendas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
{% with messages = get_flashed_messages() %}
  {% if messages %}
    <script>
      alert("{{ messages[0] }}");
    </script>
  {% endif %}
{% endwith %}
<body class="bg-dark text-white text-center">

    <div class="container mt-5">
        <div style="text-align: left;">
            <button class="btn btn-outline-danger btn-lg" style="margin-right: 40px" onclick="window.location.href='/'">
                Home
            </button>
            <button class="btn btn-outline-danger btn-lg" onclick="window.location.href='/cliente'">
                Voltar
            </button>
        </div>

        <hr>
        <h1>Lista de Clientes</h1><br>

        <table class="table table-dark table-striped">
            <thead class="table-warning">
                <tr>
                    <th>ID</th>
                    <th>Nome</th>
                    <th>Email</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody id="tabela-clientes"></tbody>
        </table>

        <br><hr>
    
        <div style="text-align: right;">
            <button class="btn btn-outline-warning btn-lg" onclick="window.location.href='/cliente/cadastro'">
                Cadastrar
            </button>
        </div>

    </div>

    <script src="{{ url_for('static', filename='script-clientes.js') }}"></script>
    <script>
        carregarClientes();
    </script>
</body>
</html>
