<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste Flask</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="bg-dark text-white text-center">

    <div class="container mt-5">
        <h1>🔥Editar Cliente🔥</h1>

        <form method="POST">
            <div class="div-id">
                <div class="div-int">
                    <a class="badge text-bg-danger" style="font-size: 15px;">ID(o ID é único e não pode ser alterado):</a>
                    <a type="text" style="font-size: 30px;" class="badge text-bg">{{ cliente.id_cliente }}</a>
                </div> <br>
                <div class="div-int">
                    <a class="badge text-bg-danger" style="font-size: 15px;">ICPF(o CPF é único e não pode ser alterado):</a>
                    <a type="text" style="font-size: 30px;">{{ cliente.cpf }}</a>
                </div><br><br>
            </div>
            <input class="ipt-cadastro"  type="text" name="nome" value="{{ cliente.nome }}" required><br>
            <input class="ipt-cadastro"  type="email" name="email" value="{{ cliente.email }}" required><br><br>

            <button class="btn btn-outline-success btn-lg" type="submit">Alterar</button>
        </form>
        <br><hr>
        <form method="POST" action="{{ url_for('clientesite.deletar_cliente', id_cliente=cliente.id_cliente) }}">
            <button type="submit" class="btn btn-outline-danger btn-lg" onclick="return confirm('Deseja excluir este cliente?')">
                Excluir Cliente
            </button>
        </form>
    </div>

</body>
</html>
