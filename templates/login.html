<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartVendas</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body class="bg-dark text-white text-center">


    <div class="container mt-5 text-center">
        <hr><h1>BEM-VINDO AO SMARTVENDAS</h1><hr><br>

        <div class="d-flex justify-content-center align-items-center">
            <div class="card login-card p-4 shadow">
                <h1 style="font-size: 6rem;">Login</h1><br><br>

                <input class="ipt-cadastro" id="username" placeholder="Usuário"><br><br>
                <input class="ipt-cadastro" id="password" type="password" placeholder="Senha"><br><br>

                <button onclick="login()" class="btn btn-outline-warning">Entrar</button>
            </div>
        </div>
    </div>
<script >
    async function login() {
        const username = document.getElementById("username").value;
        const password = document.getElementById("password").value;

        const res = await fetch("/api/login", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({username, password})
        });

        const data = await res.json();

        if (res.ok) {
            window.location.href = "/";
        } else {
            alert(data.error);
        }
    }
</script>

</body>
</html>
